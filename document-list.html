<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>帳票一覧</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP"; padding:16px; max-width:1100px; margin:auto; }
    .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    label { font-size:14px; }
    select, input[type="text"] { padding:6px 8px; font-size:14px; }
    button { padding:6px 10px; font-size:14px; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { border:1px solid #e0e0e0; padding:8px; text-align:left; }
    th { background:#f5f5f5; }
    tr.cancelled { background:#fff0f0; color:#6b6b6b; }
    tr:hover { background:#eef7ff; cursor:pointer; }
    .small { font-size:13px; color:#666; }
    .bottom-actions { margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .bottom-actions-right { margin-left:auto; display:flex; gap:8px; }
  </style>
</head>
<body>

  <h1>帳票一覧</h1>

  <div class="controls">
    <div>
      <label for="year">年</label>
      <select id="year"></select>
    </div>

    <div>
      <label for="month">月</label>
      <select id="month"></select>
    </div>

    <div>
      <label for="kubun">区分</label>
      <select id="kubun" disabled>
        <option value="ALL">全て</option>
        <option value="MT">見積 (MT)</option>
        <option value="SE">請求 (SE)</option>
        <option value="DL">納品 (DL)</option>
        <option value="PO">発注 (PO)</option>
        <option value="UR">売掛登録モード</option>
        <option value="KI">買掛登録モード</option>
      </select>
    </div>

    <div>
      <label for="torihikisaki_name">取引先</label>
      <input id="torihikisaki_name" list="torihikisaki_list" placeholder="取引先名で補完" />
      <datalist id="torihikisaki_list"></datalist>
      <input id="torihikisaki_id" type="hidden" />
    </div>

    <div>
      <label for="freeword">フリーワード</label>
      <input id="freeword" type="text" placeholder="ID / タイトル / 発行日 / 取引先" />
    </div>

    <div style="margin-left:auto;">
      <button id="btnSearch">検索</button>
      <button id="btnClear">クリア</button>
    </div>
  </div>

  <table aria-label="帳票一覧">
    <thead>
      <tr>
        <th style="width:40px">選択</th>
        <th>ID</th>
        <th>発行日</th>
        <th>取引先</th>
        <th>タイトル</th>
        <th style="text-align:right">合計</th>
        <th>MF連携</th>
        <th>取消</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="bottom-actions">
    <div>
      <span class="small">※1 行選択して操作してください</span>
    </div>
    <div class="bottom-actions-right">
      <button id="btnView">参照</button>
      <button id="btnEdit">編集</button>
      <button id="btnMf">MF連携</button>
      <button id="btnCancelDoc">取消</button>
      <button id="btnUrKake">売掛登録</button>
      <button id="btnKiKake">買掛登録</button>
      <button id="btnPdf">PDF</button>
      <button onclick="location.href='index.html'">メニューへ</button>
    </div>
  </div>

  <div style="margin-top:8px;">
    <span class="small">※区分はメニューから渡された初期値を固定します（画面上での切替は無効）。</span>
  </div>

  <!-- Supabase 初期化 -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://omzcbfjtwyygvvgxsiov.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Plndzp1kowyp6OgTwTGwHA_iUIO0ae0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ----------------------------
    // ログインチェック
    // ----------------------------
    async function checkLogin() {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "https://aqanova-development01.github.io/SalesManagement/login.html";
        return false;
      }
      return true;
    }

    window.showError = (msg) => { alert('エラー: ' + msg); console.error(msg); };

    function getKubun(id) {
      return id.substring(0, 2);
    }


    /* ============================
       MF連携（Edge Function 呼び出し）
       ============================ */
    window.sendMF = async function(id) {
      const kubun = getKubun(id);

      let endpoint = null;
      let label = "";

      if (kubun === "MT") { endpoint = "mf_send_quote"; label = "見積書"; }
      else if (kubun === "DL") { endpoint = "mf_send_delivery"; label = "納品書"; }
      else if (kubun === "PO") { endpoint = "mf_send_purchase_order"; label = "発注書"; }
      else if (kubun === "SE") { endpoint = "mf_send_invoice"; label = "請求書"; }
      else { alert("不明な区分です"); return; }

      const { data: sessionData } = await supabase.auth.getSession();
      const accessToken = sessionData?.session?.access_token;
      if (!accessToken) return alert("ログインが必要です");

      const url = `${SUPABASE_URL}/functions/v1/${endpoint}`;

      const res = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${accessToken}`
        },
        body: JSON.stringify({ document_id: id })
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        alert(`${label}連携エラー: ${JSON.stringify(json)}`);
        return;
      }

      alert(`${label}をMFへ連携しました`);
      await search();
    };

    /* ============================
       行選択
       ============================ */
    function getSelectedRowData() {
      const checked = document.querySelector('input[name="selectedDoc"]:checked');
      if (!checked) return null;
      const tr = checked.closest('tr');
      return {
        id: tr.dataset.id,
        kubun: tr.dataset.kubun,
        cancelFlag: Number(tr.dataset.cancelFlag || 0),
        mfDocumentId: tr.dataset.mfDocumentId || null
      };
    }

    /* ============================
       ボタン活性制御
       ============================ */
    function updateActionButtons(row) {
      const urlKubun = document.getElementById('kubun').value;

      // 編集
      document.getElementById('btnEdit').disabled = (row.cancelFlag == 1 || row.mfDocumentId);

      // ★ MF連携（MT と SE の時だけ活性）
      const isMfTarget = (row.kubun === 'MT' || row.kubun === 'SE');
      document.getElementById('btnMf').disabled =
        !(isMfTarget) || row.cancelFlag == 1 || row.mfDocumentId;

      // 取消
      document.getElementById('btnCancelDoc').disabled = (row.cancelFlag == 1);

      // ★ 売掛（UR）→ URL が UR かつ 行が MT の時だけ
      document.getElementById('btnUrKake').disabled = !(
        urlKubun === 'UR' && row.kubun === 'MT'
      );

      // ★ 買掛（KI）→ URL が KI かつ 行が PO の時だけ
      document.getElementById('btnKiKake').disabled = !(
        urlKubun === 'KI' && row.kubun === 'PO'
      );
      if (urlKubun === 'UR' || urlKubun === 'KI') {
        document.getElementById('btnEdit').disabled = true;
        document.getElementById('btnMf').disabled = true;
        document.getElementById('btnCancelDoc').disabled = true;
        return; // これ以降の通常ロジックは不要
      }
      // ★ PDF（PO のときだけ活性）
      document.getElementById('btnPdf').disabled = !(row.kubun === 'PO');
    }

    /* ============================
       初期処理
       ============================ */
    window.addEventListener('DOMContentLoaded', async () => {

      // ★ 最初にログインチェック
      const ok = await checkLogin();
      if (!ok) return;

      // URL パラメータ
      const params = new URLSearchParams(location.search);
      const initialKubun = params.get('kubun') || 'ALL';
      document.getElementById('kubun').value = initialKubun;

      /* 取引先名 → ID */
      document.getElementById('torihikisaki_name').addEventListener('input', () => {
        const name = document.getElementById('torihikisaki_name').value;
        const opts = document.getElementById('torihikisaki_list').options;
        document.getElementById('torihikisaki_id').value = '';
        for (let i=0;i<opts.length;i++){
          if (opts[i].value === name) {
            document.getElementById('torihikisaki_id').value = opts[i].dataset.id;
            break;
          }
        }
      });

      /* 年月初期化 */
      function initYearMonth() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;

        const yearSel = document.getElementById('year');
        const monthSel = document.getElementById('month');
        yearSel.innerHTML = '';
        monthSel.innerHTML = '';

        for (let y = year - 5; y <= year + 1; y++) {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          if (y === year) opt.selected = true;
          yearSel.appendChild(opt);
        }
        for (let m = 1; m <= 12; m++) {
          const opt = document.createElement('option');
          opt.value = String(m).padStart(2,'0');
          opt.textContent = m;
          if (m === month) opt.selected = true;
          monthSel.appendChild(opt);
        }
      }

      /* 取引先一覧 */
      async function loadTorihikisakiList() {
        const { data } = await supabase.from('torihikisaki').select('id,name').order('name');
        const dl = document.getElementById('torihikisaki_list');
        dl.innerHTML = '';
        data.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.name;
          opt.dataset.id = t.id;
          dl.appendChild(opt);
        });
      }

      /* ============================
         検索処理（フリーワード修正版）
         ============================ */
      async function search() {
        const year = Number(document.getElementById('year').value);
        const month = Number(document.getElementById('month').value);
        const kubun = document.getElementById('kubun').value;
        const torihikisaki_id = document.getElementById('torihikisaki_id').value || null;
        const freeword = document.getElementById('freeword').value.trim();

        const startDate = new Date(Date.UTC(year, month - 1, 1)).toISOString().slice(0,10);
        const endDate   = new Date(Date.UTC(year, month, 1)).toISOString().slice(0,10);

        let query = supabase.from('document').select(`
          id, document_date, torihikisaki_id, title, total, cancel_flag,
          mf_document_id, torihikisaki(name)
        `);

        query = query.gte('document_date', startDate).lt('document_date', endDate);

        if (kubun !== 'ALL' && kubun !== 'UR' && kubun !== 'KI') {
          query = query.ilike('id', `${kubun}%`);
        }
        // ★ 売掛登録モード → MT のみ
        if (kubun === 'UR') {
          query = query.ilike('id', 'MT%');
        }
        
        // ★ 買掛登録モード → PO のみ
        if (kubun === 'KI') {
          query = query.ilike('id', 'PO%');
        }

        if (torihikisaki_id) {
          query = query.eq('torihikisaki_id', torihikisaki_id);
        }

        let { data: rows, error } = await query;
        if (error) return window.showError(error.message);

        // JOIN カラムを含む OR は Supabase がパースできないため JS 側でフィルタ
        if (freeword) {
          rows = rows.filter(r =>
            (r.id || '').includes(freeword) ||
            (r.title || '').includes(freeword) ||
            (r.document_date || '').includes(freeword) ||
            (r.torihikisaki?.name || '').includes(freeword)
          );
        }

        renderTable(rows);
      }

      /* ============================
         テーブル描画
         ============================ */
      function renderTable(rows) {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';

        if (!rows.length) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td colspan="8">該当データがありません</td>`;
          tbody.appendChild(tr);
          return;
        }

        rows.forEach(r => {
          const tr = document.createElement('tr');
          if (r.cancel_flag == 1) tr.classList.add('cancelled');

          tr.dataset.id = r.id;
          tr.dataset.kubun = getKubun(r.id);
          tr.dataset.cancelFlag = r.cancel_flag ?? 0;
          tr.dataset.mfDocumentId = r.mf_document_id || '';

          // ラジオボタン
          const tdSel = document.createElement('td');
          tdSel.style.textAlign = 'center';
          const radio = document.createElement('input');
          radio.type = 'radio';
          radio.name = 'selectedDoc';
          radio.value = r.id;
          tdSel.appendChild(radio);
          tr.appendChild(tdSel);

          // ID
          const tdId = document.createElement('td');
          tdId.textContent = r.id;
          tr.appendChild(tdId);

          // 発行日
          const tdDate = document.createElement('td');
          tdDate.textContent = r.document_date?.slice(0,10) || '';
          tr.appendChild(tdDate);

          // 取引先
          const tdTori = document.createElement('td');
          tdTori.textContent = r.torihikisaki?.name || '';
          tr.appendChild(tdTori);

          // タイトル
          const tdTitle = document.createElement('td');
          tdTitle.textContent = r.title || '';
          tr.appendChild(tdTitle);

          // 合計（カンマ区切り）
          const tdTotal = document.createElement('td');
          tdTotal.style.textAlign = 'right';
          tdTotal.textContent = Number(r.total ?? 0).toLocaleString();
          tr.appendChild(tdTotal);

          // MF連携（済 / 未）
          const tdMf = document.createElement('td');
          tdMf.textContent = r.mf_document_id ? '済' : '未';
          tr.appendChild(tdMf);

          // 取消
          const tdCancel = document.createElement('td');
          tdCancel.textContent = r.cancel_flag == 1 ? 'はい' : 'いいえ';
          tr.appendChild(tdCancel);

          // 行クリックで選択
          tr.addEventListener('click', () => {
            radio.checked = true;
            updateActionButtons({
              id: r.id,
              kubun: getKubun(r.id),
              cancelFlag: r.cancel_flag,
              mfDocumentId: r.mf_document_id
            });
          });

          tbody.appendChild(tr);
        });
      }

      /* ============================
         取消処理
         ============================ */
      async function cancelDocument(docId) {
        if (!confirm('この帳票を取消しますか？')) return;

        const { data, error } = await supabase.rpc('rpc_document_cancel', {
          p_document_id: docId
        });

        if (error) return window.showError(error.message);

        alert(`取消しました（${data.document_id}）`);
        await search();
      }

      /* ============================
         掛金登録（明細ごとに採番）
         ============================ */
      async function registerKakekin(docId, kbn) {
        const session = await supabase.auth.getSession();
        const uid = session?.data?.session?.user?.id;
        if (!uid) return window.showError('未認証です');

        const { data: doc } = await supabase
          .from('document')
          .select('id, period_start, period_end, torihikisaki_id, title')
          .eq('id', docId)
          .single();

        const { data: details } = await supabase
          .from('document_detail')
          .select('hinmoku_id, item, quantity, unit, price, amount, tax_rate')
          .eq('document_id', docId)
          .order('id');

        if (!details || !details.length) return window.showError('明細がありません');

        const today = new Date().toISOString().slice(0,10);
        // ★ 予定日があれば優先
        const ship_date     = doc.period_start || today;
        const delivery_date = doc.period_end   || today;
        const keijo_date    = doc.period_end   || today;

        for (const d of details) {
          const { data: newId, error: seqErr } = await supabase.rpc(
            'get_next_document_code',
            { prefix: kbn, p_date: keijo_date }
          );
          if (seqErr) return window.showError('採番エラー: ' + seqErr.message);

          const row = {
            id: newId,
            kake_kbn: kbn,
            torihikisaki_id: doc.torihikisaki_id,

            ship_date,
            delivery_date,
            keijo_date,

            hinmoku_id: d.hinmoku_id,
            item: d.item,
            quantity: d.quantity,
            unit: d.unit,
            price: d.price,
            amount: d.amount,
            tax_rate: d.tax_rate,

            mitsumori_no: (kbn === 'UR' ? doc.id : null),
            nouhin_no:   (kbn === 'KI' ? doc.id : null),

            memo: doc.title || '',
            invoice_check: 0,

            created_by: uid,
            updated_by: uid
          };

          const { error: insErr } = await supabase.from('kakekin').insert(row);
          if (insErr) return window.showError(insErr.message);
        }

        alert(`掛金を登録しました（${kbn === 'UR' ? '売掛' : '買掛'} / ${details.length}件）`);
      }

      /* ============================
         ボタンイベント
         ============================ */

      // 検索
      document.getElementById('btnSearch').addEventListener('click', search);

      // クリア
      document.getElementById('btnClear').addEventListener('click', () => {
        document.getElementById('torihikisaki_name').value = '';
        document.getElementById('torihikisaki_id').value = '';
        document.getElementById('freeword').value = '';
        initYearMonth();
        search();
      });

      // 参照
      document.getElementById('btnView').addEventListener('click', () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');
        location.href = `document-edit.html?kubun=${row.kubun}&id=${row.id}&mode=view`;
      });

      // 編集
      document.getElementById('btnEdit').addEventListener('click', () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');

        if (row.cancelFlag == 1 || row.mfDocumentId) {
          return alert('取消済またはMF連携済の帳票は編集できません');
        }

        location.href = `document-edit.html?kubun=${row.kubun}&id=${row.id}&mode=edit`;
      });

      // MF連携
      document.getElementById('btnMf').addEventListener('click', async () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');

        if (row.cancelFlag == 1) return alert('取消済の帳票はMF連携できません');
        if (row.mfDocumentId) return alert('すでにMF連携済です');

        if (!confirm('MFクラウドへ送信しますか？')) return;

        await window.sendMF(row.id);
      });

      // 取消
      document.getElementById('btnCancelDoc').addEventListener('click', async () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');

        if (row.cancelFlag == 1) return alert('すでに取消済です');

        await cancelDocument(row.id);
      });

      // ★ 売掛（UR）→ URL が UR かつ 行が MT の時だけ
      document.getElementById('btnUrKake').addEventListener('click', async () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');

        const urlKubun = document.getElementById('kubun').value;

        if (urlKubun !== 'UR') {
          return alert('売掛登録モードではありません（URLにkubun=URが必要）');
        }

        if (row.kubun !== 'MT') {
          return alert('売掛登録は見積(MT)のみです');
        }

        if (!confirm('売掛登録しますか？')) return;

        await registerKakekin(row.id, 'UR');
      });

      // ★ 買掛（KI）→ URL が KI かつ 行が PO の時だけ
      document.getElementById('btnKiKake').addEventListener('click', async () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');

        const urlKubun = document.getElementById('kubun').value;

        if (urlKubun !== 'KI') {
          return alert('買掛登録モードではありません（URLにkubun=KIが必要）');
        }

        if (row.kubun !== 'PO') {
          return alert('買掛登録は発注(PO)のみです');
        }

        if (!confirm('買掛登録しますか？')) return;

        await registerKakekin(row.id, 'KI');
      });

      // ★ PDF 出力（PO のときのみ）
      document.getElementById('btnPdf').addEventListener('click', () => {
        const row = getSelectedRowData();
        if (!row) return alert('行を選択してください');
      
        if (row.kubun !== 'PO') {
          return alert('PDF 出力は発注書（PO）のみ対応です');
        }
      
        location.href = `document-pdf.html?id=${row.id}`;
      });


      /* ============================
         初期ロード
         ============================ */
      initYearMonth();
      await loadTorihikisakiList();
      await search();

      // 初期状態では売掛／買掛ボタンは無効
      document.getElementById('btnUrKake').disabled = true;
      document.getElementById('btnKiKake').disabled = true;
      if (initialKubun === 'UR' || initialKubun === 'KI') {
        document.getElementById('btnEdit').disabled = true;
        document.getElementById('btnMf').disabled = true;
        document.getElementById('btnCancelDoc').disabled = true;
      }

      window.search = search;
    });
  </script>
</body>
</html>
