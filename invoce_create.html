<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>и«ӢжұӮгғҮгғјгӮҝдҪңжҲҗ</title>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://omzcbfjtwyygvvgxsiov.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Plndzp1kowyp6OgTwTGwHA_iUIO0ae0";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ----------------------------
    // гғӯгӮ°гӮӨгғігғҒгӮ§гғғгӮҜ
    // ----------------------------
    async function checkLogin() {
      const { data, error } = await supabase.auth.getUser();
      if (error || !data.user) {
        window.location.href = "login.html";
        return false;
      }
      return true;
    }

    // ----------------------------
    // еҲқжңҹеҮҰзҗҶ
    // ----------------------------
    window.addEventListener("DOMContentLoaded", async () => {
      if (!(await checkLogin())) return;

      setInitialPeriod();
      await loadTorihikisaki();
    });

    // ----------------------------
    // еҪ“жңҲгҒ®жңҲеҲқгғ»жңҲжң«гӮ’гӮ»гғғгғҲ
    // ----------------------------
    function setInitialPeriod() {
      const now = new Date();
      const first = new Date(now.getFullYear(), now.getMonth(), 1);
      const last  = new Date(now.getFullYear(), now.getMonth() + 1, 0);

      document.getElementById("start_date").value = formatDateLocal(first);
      document.getElementById("end_date").value   = formatDateLocal(last);
      document.getElementById("doc_date").value = formatDateLocal(last);
    }

    // ж—Ҙд»ҳз”ҹжҲҗ
    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
    // ----------------------------
    // еҸ–еј•е…ҲдёҖиҰ§гғӯгғјгғү
    // ----------------------------
    async function loadTorihikisaki() {
      const { data, error } = await supabase
        .from("torihikisaki")
        .select("id, name")
        .order("id");

      if (error) {
        alert("еҸ–еј•е…ҲеҸ–еҫ—гӮЁгғ©гғј: " + error.message);
        return;
      }

      const sel = document.getElementById("torihikisaki");
      data.forEach(row => {
        const opt = document.createElement("option");
        opt.value = row.id;
        opt.textContent = row.name;
        sel.appendChild(opt);
      });
    }

    // ----------------------------
    // гғ—гғ¬гғ“гғҘгғје®ҹиЎҢ
    // ----------------------------
    async function loadPreview() {
      const start = document.getElementById("start_date").value;
      const end   = document.getElementById("end_date").value;
      const tid   = document.getElementById("torihikisaki").value;

      const { data, error } = await supabase.rpc("preview_invoice", {
        p_start: start,
        p_end: end,
        p_torihikisaki_id: tid
      });

      if (error) {
        alert("гғ—гғ¬гғ“гғҘгғјеҸ–еҫ—гӮЁгғ©гғј: " + error.message);
        return;
      }

      renderPreview(data);
    }

    // ----------------------------
    // гғ—гғ¬гғ“гғҘгғјжҸҸз”»
    // ----------------------------
    let previewData = {}; // гӮ°гғ«гғјгғ—еҢ–еҫҢгҒ®гғҮгғјгӮҝдҝқжҢҒ

    function renderPreview(rows) {
      const area = document.getElementById("preview_area");
      area.innerHTML = "";

      if (!rows || rows.length === 0) {
        area.innerHTML = "<p>еҜҫиұЎгғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ</p>";
        updateSummary(0, 0, 0);
        return;
      }

      // гӮ°гғ«гғјгғ”гғігӮ°
      previewData = {};
      rows.forEach(r => {
        if (!previewData[r.torihikisaki_id]) previewData[r.torihikisaki_id] = {
          name: r.torihikisaki_name,
          rows: []
        };
        previewData[r.torihikisaki_id].rows.push(r);
      });

      let totalCount = 0;
      let totalAmount = 0;

      for (const tid in previewData) {
        const g = previewData[tid];
        const groupDiv = document.createElement("div");
        groupDiv.className = "group";

        const groupTotal = g.rows.reduce((sum, r) => sum + Number(r.amount), 0);
        totalCount += g.rows.length;
        totalAmount += groupTotal;

        // гӮ°гғ«гғјгғ—гғҳгғғгғҖ
        groupDiv.innerHTML = `
          <div class="group-header">
            ${g.name}пјҲ${g.rows.length}д»¶пјүгҖҖ
            еҜҫиұЎжңҹй–“еҗҲиЁҲпјҡ${groupTotal.toLocaleString()} еҶҶ
          </div>
          <table>
            <tr>
              <th>йҒёжҠһ</th>
              <th>жҺӣйҮ‘ID</th>
              <th>иЁҲдёҠж—Ҙ</th>
              <th>е“Ғзӣ®</th>
              <th>ж•°йҮҸ</th>
              <th>йҮ‘йЎҚ</th>
              <th>иҰӢз©Қз•ӘеҸ·</th>
              <th>зҙҚе“Ғз•ӘеҸ·</th>
            </tr>
          </table>
        `;

        const table = groupDiv.querySelector("table");

        g.rows.forEach((r, idx) => {
          r.selected = true;
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><input type="checkbox" checked onchange="updateSelection('${tid}', ${idx})"></td>
            <td>${r.kakekin_id}</td>
            <td>${r.keijo_date}</td>
            <td>${r.item}</td>
            <td>${r.quantity}</td>
            <td>${Number(r.amount).toLocaleString()}</td>
            <td>${r.mitsumori_no ?? ""}</td>
            <td>${r.nouhin_no ?? ""}</td>
          `;
          table.appendChild(tr);
        });

        area.appendChild(groupDiv);
      }

      updateSummary(totalCount, totalAmount, 0);
    }

    // ----------------------------
    // йҒёжҠһеӨүжӣҙ
    // ----------------------------
    function updateSelection(tid, idx) {
      const g = previewData[tid];
      g.rows[idx].selected = !g.rows[idx].selected;

      updateAllSummary();
    }

    function updateAllSummary() {
      let total = 0;
      let selected = 0;

      for (const tid in previewData) {
        const g = previewData[tid];
        g.rows.forEach(r => {
          total += Number(r.amount);
          if (r.selected !== false) selected += Number(r.amount);
        });
      }

      updateSummary(
        Object.values(previewData).reduce((sum, g) => sum + g.rows.length, 0),
        total,
        selected
      );
    }

    // ----------------------------
    // гӮөгғһгғӘжӣҙж–°
    // ----------------------------
    function updateSummary(count, total, selected) {
      const unselected = total - selected;

      document.getElementById("summary_bar").innerHTML =
        `еҜҫиұЎд»¶ж•°: ${count} д»¶гҖҖ
         еҜҫиұЎжңҹй–“еҗҲиЁҲ: ${total.toLocaleString()} еҶҶгҖҖ
         йҒёжҠһеҗҲиЁҲ: ${selected.toLocaleString()} еҶҶгҖҖ
         жңӘйҒёжҠһеҗҲиЁҲ: ${unselected.toLocaleString()} еҶҶ`;
    }

    // ----------------------------
    // и«ӢжұӮгғҮгғјгӮҝдҪңжҲҗпјҲDBFunction е‘јгҒіеҮәгҒ—пјү
    // ----------------------------
    async function createInvoice() {
      if (!confirm("йҒёжҠһгҒ—гҒҹеҶ…е®№гҒ§и«ӢжұӮгғҮгғјгӮҝгӮ’дҪңжҲҗгҒ—гҒҫгҒҷгҖӮгӮҲгӮҚгҒ—гҒ„гҒ§гҒҷгҒӢпјҹ")) return;
    
      const payload = {
        p_doc_date: document.getElementById("doc_date").value,
        p_period_start: document.getElementById("start_date").value,
        p_period_end: document.getElementById("end_date").value,
        p_groups: Object.entries(previewData).map(([tid, g]) => ({
          torihikisaki_id: tid,
          selected_kakekin_ids: g.rows
            .filter(r => r.selected !== false)
            .map(r => r.kakekin_id )
        }))
        .filter(g => g.selected_kakekin_ids.length > 0)
      };
    
      console.log("payload", payload);
      const { data, error } = await supabase.rpc('rpc_invoice_create_bulk', payload);  // DBfunctionеҢ–
      // const { data, error } = await supabase.functions.invoke("invoice_create", {
      //   body: payload
      // });

      console.log("RPC result", data);


      if (error) {
        alert("дҪңжҲҗгӮЁгғ©гғј: " + JSON.stringify(error));
        console.error(error);
        return;
      }
    
      alert("и«ӢжұӮгғҮгғјгӮҝдҪңжҲҗгҒҢе®ҢдәҶгҒ—гҒҫгҒ—гҒҹ");
      console.log(data);
    }

    window.loadPreview = loadPreview;
    window.updateSelection = updateSelection;
    window.createInvoice = createInvoice;

  </script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    .group { border: 1px solid #ccc; margin-top: 20px; padding: 10px; }
    .group-header { font-weight: bold; margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
    .summary-bar { background: #f0f0f0; padding: 10px; margin-top: 20px; }
  </style>
</head>

<body>

<h2>и«ӢжұӮгғҮгғјгӮҝдҪңжҲҗ</h2>

<!-- гғ•гӮЈгғ«гӮҝ -->
<div>
  <label>й–Ӣе§Ӣж—Ҙ: <input type="date" id="start_date"></label>
  <label>зөӮдәҶж—Ҙ: <input type="date" id="end_date"></label>

  <label>еҸ–еј•е…Ҳ:
    <select id="torihikisaki">
      <option value="ALL">е…ЁеҸ–еј•е…Ҳ</option>
    </select>
  </label>

  <button onclick="loadPreview()">гғ—гғ¬гғ“гғҘгғј</button>
</div>

<!-- гӮөгғһгғӘ -->
<div class="summary-bar" id="summary_bar">
  еҜҫиұЎд»¶ж•°: 0 д»¶гҖҖ
  еҜҫиұЎжңҹй–“еҗҲиЁҲ: 0 еҶҶгҖҖ
  йҒёжҠһеҗҲиЁҲ: 0 еҶҶгҖҖ
  жңӘйҒёжҠһеҗҲиЁҲ: 0 еҶҶ
</div>

<!-- гғ—гғ¬гғ“гғҘгғј -->
<div id="preview_area"></div>

<!-- и«ӢжұӮдҪңжҲҗ -->
<div style="margin-top:20px;">
  <label>зҷәиЎҢж—Ҙ: <input type="date" id="doc_date" value=""></label>
  <button onclick="createInvoice()">и«ӢжұӮгғҮгғјгӮҝдҪңжҲҗ</button>
</div>
  <button onclick="location.href='index.html'">гғЎгғӢгғҘгғјгҒё</button>

</body>
</html>
