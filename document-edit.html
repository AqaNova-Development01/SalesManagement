<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>帳票編集</title>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://omzcbfjtwyygvvgxsiov.supabase.co",
      "sb_publishable_Plndzp1kowyp6OgTwTGwHA_iUIO0ae0"
    );

    // ----------------------------
    // URL パラメータ
    // ----------------------------
    const params = new URLSearchParams(window.location.search);
    const kubun = params.get("kubun");   // MT / PO / DL / SE
    const docId = params.get("id");      // 編集時のみ
    const mode = params.get("mode") || "edit";

    // ----------------------------
    // ログインチェック
    // ----------------------------
    async function checkLogin() {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        window.location.href = "login.html";
        return false;
      }
      return true;
    }

    // ----------------------------
    // 初期処理
    // ----------------------------
    window.addEventListener("DOMContentLoaded", async () => {

      if (!(await checkLogin())) return;

      await loadTorihikisaki();

      if (docId) {
        await loadExistingDocument(docId);
      } else {
        setDefaultHeader();
      }

      if (kubun === "PO") {
        document.getElementById("delivery_to_area").style.display = "block";
        await loadDeliveryToList();
      }

      // MT/PO の新規作成時のみ品目リスト表示
      if (kubun === "MT") await loadItemMaster_MT();
      if (!docId && kubun === "PO") await loadItemMaster_PO();

      // ★ DL/SE 編集モードは品目リスト非表示
      if (kubun === "DL" && docId) {
        document.getElementById("item_list").style.display = "none";
      }
      if (kubun === "SE" && docId) {
        document.getElementById("item_list").style.display = "none";
      }

      // ★ DL/SE 編集モードは取引先IDを非活性
      if (kubun === "DL" && docId) {
        document.getElementById("torihikisaki").disabled = true;
      }
      if (kubun === "SE" && docId) {
        document.getElementById("torihikisaki").disabled = true;
      }

      // ★ DL/SE 編集モードは明細編集不可
      if (kubun === "DL" && docId) {
        document.querySelectorAll("#detail_body input").forEach(el => el.disabled = true);
        document.querySelectorAll("#detail_body button").forEach(btn => btn.style.display = "none");
      }
      if (kubun === "SE" && docId) {
        document.querySelectorAll("#detail_body input").forEach(el => el.disabled = true);
        document.querySelectorAll("#detail_body button").forEach(btn => btn.style.display = "none");
      }

      if (mode === "view") {
        setReadOnlyMode();
      }
    });

    // ----------------------------
    // view モード
    // ----------------------------
    function setReadOnlyMode() {
      document.querySelectorAll("input, textarea, select, button").forEach(el => {
        if (el.id === "btnBack" || el.id === "btnMenu") return;
        el.disabled = true;
      });

      document.getElementById("item_list").style.display = "none";

      document.querySelectorAll("#detail_body button").forEach(btn => {
        btn.style.display = "none";
      });

      document.getElementById("title_page").textContent += "（参照）";
    }

    // ----------------------------
    // 納品先リスト表示
    // ----------------------------
    async function loadDeliveryToList() {
      const { data } = await supabase
        .from("torihikisaki")
        .select("id, name, zip, address1, address2, department, person")
        .order("id");
    
      const sel = document.getElementById("delivery_to_select");
      data.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = `${r.id} ${r.name}`;
        opt.dataset.zip = r.zip || "";
        opt.dataset.address1 = r.address1 || "";
        opt.dataset.address2 = r.address2 || "";
        opt.dataset.department = r.department || "";
        opt.dataset.person = r.person || "";
        sel.appendChild(opt);
      });
    }

    // ----------------------------
    // 納品先選択時処理
    // ----------------------------
    window.onDeliveryToSelect = function() {
      const sel = document.getElementById("delivery_to_select");
      const opt = sel.options[sel.selectedIndex];
      if (!opt.value) return;
    
      document.getElementById("name").value = opt.textContent.split(" ").slice(1).join(" ");
      document.getElementById("department").value = opt.dataset.department || "";
      document.getElementById("person").value = opt.dataset.person || "";
    
      const addr = `〒${opt.dataset.zip} ${opt.dataset.address1}${opt.dataset.address2}`;
      document.getElementById("invoice_number").value = addr;
    };
    // ----------------------------
    // 取引先一覧
    // ----------------------------
    async function loadTorihikisaki() {
      const { data } = await supabase
        .from("torihikisaki")
        .select("id, name")
        .order("id");

      const sel = document.getElementById("torihikisaki");
      data.forEach(r => {
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = `${r.id} ${r.name}`;
        sel.appendChild(opt);
      });
    }

    // ----------------------------
    // 取引先変更イベント（PO のみ）
    // ----------------------------
    window.onTorihikisakiChange = async function() {
      if (kubun === "PO" && !docId) {
        await loadItemMaster_PO();
      }
    };

    // ----------------------------
    // ヘッダ初期値
    // ----------------------------
    function setDefaultHeader() {
      const today = new Date();
      document.getElementById("document_date").value = formatDate(today);

      if (kubun === "MT") {
        document.getElementById("title_page").innerText = "見積書 作成";
        document.getElementById("title").value = "見積書";
      } else if (kubun === "PO") {
        document.getElementById("title_page").innerText = "発注書 作成";
        document.getElementById("title").value = "発注書";
      } else if (kubun === "DL") {
        document.getElementById("title_page").innerText = "納品書 作成";
        document.getElementById("title").value = "納品書";
      } else if (kubun === "SE") {
        document.getElementById("title_page").innerText = "請求書 作成";
        document.getElementById("title").value = "請求書";
      }
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    // ----------------------------
    // 既存データ読み込み
    // ----------------------------
    async function loadExistingDocument(id) {

      const { data: doc } = await supabase
        .from("document")
        .select("*")
        .eq("id", id)
        .single();

      document.getElementById("title_page").innerText =
        (kubun === "MT" ? "見積書" :
         kubun === "PO" ? "発注書" :
         kubun === "DL" ? "納品書" :
         "請求書") + " 編集";

      document.getElementById("torihikisaki").value = doc.torihikisaki_id;
      document.getElementById("document_date").value = doc.document_date;
      document.getElementById("title").value = doc.title;
      document.getElementById("memo").value = doc.memo ?? "";
      document.getElementById("period_start").value = doc.period_start ?? "";
      document.getElementById("period_end").value = doc.period_end ?? "";

      if (kubun === "PO") {
        document.getElementById("name").value = doc.name ?? "";
        document.getElementById("department").value = doc.department ?? "";
        document.getElementById("person").value = doc.person ?? "";
        document.getElementById("invoice_number").value = doc.invoice_number ?? "";

        // ★ ドロップダウンも選択状態にしたい場合（任意）
        const sel = document.getElementById("delivery_to_select");
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].textContent.includes(doc.name)) {
            sel.selectedIndex = i;
            break;
          }
        }
      }

      // 明細取得
      const { data: details } = await supabase
        .from("document_detail")
        .select("*")
        .eq("document_id", id)
        .order("id");

      for (const d of details) {
        addDetail(
          d.hinmoku_id ?? "",
          d.item,
          d.price,
          d.unit,
          d.tax_rate
        );

        const tr = document.querySelector("#detail_body tr:last-child");

        tr.children[1].children[0].value = d.quantity;
        tr.children[2].children[0].value = Number(d.price || 0).toLocaleString();
        tr.children[4].children[0].value = d.unit;
        tr.children[5].children[0].value = d.tax_rate;

        recalc(tr.children[1].children[0]);
      }

      calcTotal();
    }

    // ----------------------------
    // 品目ロード（MT）
    // ----------------------------
    async function loadItemMaster_MT() {
      const { data } = await supabase
        .from("hinmoku")
        .select("id, name, price, unit, tax_rate")
        .eq("torihikisaki_id", "TK00000")
        .order("id");

      renderItemList(data);
    }

    // ----------------------------
    // 品目ロード（PO）
    // ----------------------------
    async function loadItemMaster_PO() {
      const tId = document.getElementById("torihikisaki").value;
      if (!tId) return;

      const { data } = await supabase
        .from("hinmoku")
        .select("id, name, price, unit, tax_rate")
        .eq("torihikisaki_id", tId)
        .order("id");

      renderItemList(data);
    }

    // ----------------------------
    // 品目リスト描画
    // ----------------------------
    function renderItemList(list) {
      const area = document.getElementById("item_list");
      area.innerHTML = "";

      list.forEach(r => {
        const div = document.createElement("div");
        div.className = "item-row";
        div.innerHTML = `
          <button onclick="addDetail('${r.id}', '${r.name}', ${r.price}, '${r.unit}', ${r.tax_rate})">
            追加
          </button>
          ${r.name}（${Number(r.price).toLocaleString()} 円 / ${r.unit} / 税率:${r.tax_rate}%）
        `;
        area.appendChild(div);
      });
    }

    // ----------------------------
    // 明細追加（null 安全化済）
    // ----------------------------
    window.addDetail = function(id, name, price, unit, tax_rate) {
      const tbody = document.getElementById("detail_body");

      const safePrice = Number(price || 0);
      const safeTax = Number(tax_rate || 0);

      const tr = document.createElement("tr");
      tr.dataset.hinmokuId = id;

      tr.innerHTML = `
        <td><input type="text" value="${name}"></td>
        <td><input type="text" class="num" value="1" oninput="recalc(this)"></td>
        <td><input type="text" class="num" value="${safePrice.toLocaleString()}" oninput="recalc(this)"></td>
        <td class="amount num">0</td>
        <td><input type="text" value="${unit || ""}"></td>
        <td><input type="text" class="num" value="${safeTax}" oninput="recalc(this)"></td>
        <td><button onclick="this.closest('tr').remove(); calcTotal();">削除</button></td>
      `;
      tbody.appendChild(tr);

      recalc(tr.querySelector("input"));
    };

    // ----------------------------
    // 金額再計算
    // ----------------------------
    window.recalc = function(elm) {
      const tr = elm.closest("tr");

      const qty = Number(tr.children[1].children[0].value.replace(/,/g, ""));
      const price = Number(tr.children[2].children[0].value.replace(/,/g, ""));

      const amount = qty * price;
      tr.querySelector(".amount").textContent = amount.toLocaleString();

      calcTotal();
    };

    function calcTotal() {
      let sum = 0;
      document.querySelectorAll(".amount").forEach(td => {
        sum += Number(td.textContent.replace(/,/g, ""));
      });
      document.getElementById("total").textContent = sum.toLocaleString();
    }

    // ----------------------------
    // 保存処理
    // ----------------------------
    window.saveDocument = async function() {
      if (mode === "view") return;

      if (kubun === "MT") {
        if (docId) await updateMT(docId);
        else await saveMT();
      } else if (kubun === "PO") {
        if (docId) await updatePO(docId);
        else await savePO();
      } else if (kubun === "DL") {
        if (docId) await updateDL(docId);
        else alert("納品書の新規作成は invoice_create から行ってください");
      } else if (kubun === "SE") {
        if (docId) await updateSE(docId);
        else alert("請求書の新規作成は invoice_create から行ってください");
      }
    };

    // ----------------------------
    // 明細収集
    // ----------------------------
    function collectDetails() {
      const details = [];
      document.querySelectorAll("#detail_body tr").forEach(tr => {
        const item = tr.children[0].children[0].value;
        const qty = Number(tr.children[1].children[0].value.replace(/,/g, ""));
        const price = Number(tr.children[2].children[0].value.replace(/,/g, ""));
        const amount = Number(tr.querySelector(".amount").textContent.replace(/,/g, ""));
        const unit = tr.children[4].children[0].value;
        const tax_rate = Number(tr.children[5].children[0].value);
        const hinmoku_id = tr.dataset.hinmokuId || null;

        details.push({ item, qty, price, amount, unit, tax_rate, hinmoku_id });
      });
      return details;
    }

    // ----------------------------
    // 明細登録（旧仕様）
    // ----------------------------
    async function insertDetails(docId, details, uid) {
      for (let d of details) {
        const { data: detId } = await supabase.rpc(
          "get_next_document_detail_id",
          { doc_id: docId }
        );

        await supabase.from("document_detail").insert({
          id: detId,
          document_id: docId,
          hinmoku_id: d.hinmoku_id,
          item: d.item,
          quantity: d.qty,
          price: d.price,
          amount: d.amount,
          unit: d.unit,
          tax_rate: d.tax_rate,
          created_by: uid,
          updated_by: uid
        });
      }
    }

    // ----------------------------
    // MT 新規
    // ----------------------------
    async function saveMT() {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const torihikisaki_id = document.getElementById("torihikisaki").value;
      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;

      const details = collectDetails();
      if (!details.length) {
        alert("明細がありません");
        return;
      }

      const { data: seq } = await supabase.rpc(
        "get_next_document_code",
        { prefix: "MT", p_date: document_date }
      );

      const newDocId = seq;

      await supabase.from("document").insert({
        id: newDocId,
        torihikisaki_id,
        document_date,
        title,
        period_start,
        period_end,
        total: details.reduce((s, d) => s + d.amount, 0),
        memo,
        created_by: uid,
        updated_by: uid
      });

      await insertDetails(newDocId, details, uid);

      alert("見積書を作成しました（番号: " + newDocId + "）");
      location.href = "document-list.html?kubun=MT";
    }

    // ----------------------------
    // MT 更新
    // ----------------------------
    async function updateMT(id) {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const torihikisaki_id = document.getElementById("torihikisaki").value;
      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;

      const details = collectDetails();
      if (!details.length) {
        alert("明細がありません");
        return;
      }

      await supabase
        .from("document")
        .update({
          torihikisaki_id,
          document_date,
          title,
          period_start,
          period_end,
          total: details.reduce((s, d) => s + d.amount, 0),
          memo,
          updated_by: uid,
          updated_at: new Date()
        })
        .eq("id", id);

      await supabase.from("document_detail").delete().eq("document_id", id);
      await insertDetails(id, details, uid);

      alert("見積書を更新しました");
      location.href = "document-list.html?kubun=MT";
    }

    // ----------------------------
    // PO 新規
    // ----------------------------
    async function savePO() {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const torihikisaki_id = document.getElementById("torihikisaki").value;
      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;

      // ★ 送付先（納付先）
      const name = document.getElementById("name").value;
      const department = document.getElementById("department").value;
      const person = document.getElementById("person").value;
      const invoice_number = document.getElementById("invoice_number").value; // ←住所欄として利用

      const details = collectDetails();
      if (!details.length) {
        alert("明細がありません");
        return;
      }

      const { data: seq } = await supabase.rpc(
        "get_next_document_code",
        { prefix: "PO", p_date: document_date }
      );

      const newDocId = seq;

      await supabase.from("document").insert({
        id: newDocId,
        torihikisaki_id,
        document_date,
        title,
        period_start,
        period_end,
        total: details.reduce((s, d) => s + d.amount, 0),
        memo,

        // ★ 送付先（納付先）を保存
        name,
        department,
        person,
        invoice_number,

        created_by: uid,
        updated_by: uid
      });

      await insertDetails(newDocId, details, uid);

      alert("発注書を作成しました（番号: " + newDocId + "）");
      location.href = "document-list.html?kubun=PO";
    }

    // ----------------------------
    // PO 更新
    // ----------------------------
    async function updatePO(id) {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const torihikisaki_id = document.getElementById("torihikisaki").value;
      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;
      // ★ 送付先（納付先）
      const name = document.getElementById("name").value;
      const department = document.getElementById("department").value;
      const person = document.getElementById("person").value;
      const invoice_number = document.getElementById("invoice_number").value;

      const details = collectDetails();
      if (!details.length) {
        alert("明細がありません");
        return;
      }

      await supabase
        .from("document")
        .update({
          torihikisaki_id,
          document_date,
          title,
          period_start,
          period_end,
          total: details.reduce((s, d) => s + d.amount, 0),
          memo,
          // ★ 送付先（納付先）を更新
          name,
          department,
          person,
          invoice_number,

          updated_by: uid,
          updated_at: new Date()
        })
        .eq("id", id);

      await supabase.from("document_detail").delete().eq("document_id", id);
      await insertDetails(id, details, uid);

      alert("発注書を更新しました");
      location.href = "document-list.html?kubun=PO";
    }

    // ----------------------------
    // DL 更新（ヘッダのみ更新）
    // ----------------------------
    async function updateDL(id) {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;

      // ★ DL は取引先IDを更新しない
      // ★ DL は明細を更新しない（DELETE/INSERT しない）

      const { error } = await supabase
        .from("document")
        .update({
          document_date,
          title,
          memo,
          period_start,
          period_end,
          updated_by: uid,
          updated_at: new Date()
        })
        .eq("id", id);

      if (error) {
        alert("納品書の更新に失敗しました: " + error.message);
        return;
      }

      alert("納品書を更新しました（ヘッダのみ）");
      location.href = "document-list.html?kubun=DL";
    }

    // ----------------------------
    // DL 更新（ヘッダのみ更新）
    // ----------------------------
    async function updateSE(id) {
      const { data: user } = await supabase.auth.getUser();
      const uid = user?.user?.id;

      const document_date = document.getElementById("document_date").value;
      const title = document.getElementById("title").value;
      const memo = document.getElementById("memo").value;
      const period_start = document.getElementById("period_start").value || null;
      const period_end = document.getElementById("period_end").value || null;

      // ★ SE は取引先IDを更新しない
      // ★ SE は明細を更新しない（DELETE/INSERT しない）

      const { error } = await supabase
        .from("document")
        .update({
          document_date,
          title,
          memo,
          period_start,
          period_end,
          updated_by: uid,
          updated_at: new Date()
        })
        .eq("id", id);

      if (error) {
        alert("請求書の更新に失敗しました: " + error.message);
        return;
      }

      alert("請求書を更新しました（ヘッダのみ）");
      location.href = "document-list.html?kubun=SE";
    }

  </script>

  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; }
    .item-row { margin: 5px 0; }
    input.num { text-align: right; }
    td.num { text-align: right; }
  </style>
</head>

<body>

<h2 id="title_page">帳票編集</h2>

<div>
  <label>取引先:
    <select id="torihikisaki" onchange="onTorihikisakiChange()"></select>
  </label>
  <br><br>
  

  <label>発行日:
    <input type="date" id="document_date">
  </label>
  <br><br>

  <label>表題:
    <input type="text" id="title" size="40">
  </label>
  <br><br>

  <label>発送（工事開始）予定日:
    <input type="date" id="period_start">
  </label>
  <br><br>

  <label>納品（工事終了）予定日:
    <input type="date" id="period_end">
  </label>
  <br><br>

  <div id="delivery_to_area" style="display:none; margin-top:20px;">
    <label>納付先（送付先）:
      <select id="delivery_to_select" onchange="onDeliveryToSelect()">
        <option value="">（選択してください）</option>
      </select>
    </label>
    <br><br>
  
    <label>会社名:
      <input type="text" id="name" size="40">
    </label>
    <br><br>
  
    <label>部署:
      <input type="text" id="department" size="40">
    </label>
    <br><br>
  
    <label>担当者:
      <input type="text" id="person" size="40">
    </label>
    <br><br>
  
    <label>住所（郵便番号＋住所）:
      <input type="text" id="invoice_number" size="60">
    </label>
  </div>
