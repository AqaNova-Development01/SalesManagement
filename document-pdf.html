<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発注書 PDF</title>

<style>
  body {
    font-family: sans-serif;
    padding: 40px;
    width: 800px;
    margin: auto;
  }

  h1 {
    text-align: right;
    font-size: 32px;
    margin-bottom: 10px;
  }

  .header-box {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
  }

  .company-info {
    font-size: 14px;
    line-height: 1.6;
  }

  .section-title {
    font-size: 18px;
    margin-top: 25px;
    margin-bottom: 5px;
    border-bottom: 1px solid #000;
    padding-bottom: 3px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    border: 1px solid #000;
    padding: 6px;
    font-size: 14px;
  }

  th {
    background: #f0f0f0;
  }

  .right {
    text-align: right;
  }

  .total-box {
    margin-top: 20px;
    text-align: right;
    font-size: 20px;
    font-weight: bold;
  }

  .memo-box {
    margin-top: 30px;
    border: 1px solid #000;
    padding: 10px;
    min-height: 80px;
  }
</style>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://omzcbfjtwyygvvgxsiov.supabase.co",
  "sb_publishable_Plndzp1kowyp6OgTwTGwHA_iUIO0ae0"
);

const params = new URLSearchParams(window.location.search);
const docId = params.get("id");

// ----------------------------
// ログインチェック
// ----------------------------
async function checkLogin() {
  const { data } = await supabase.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
    return false;
  }
  return true;
}

window.addEventListener("DOMContentLoaded", async () => {
  if (!(await checkLogin())) return;
  await loadPDFData();
});

// ----------------------------
// PDF データ読み込み
// ----------------------------
async function loadPDFData() {

  // ★ 自社情報（TK00000）
  const { data: my } = await supabase
    .from("torihikisaki")
    .select("*")
    .eq("id", "TK00000")
    .single();

  document.getElementById("my_name").textContent = my.name;
  document.getElementById("my_address").textContent =
    `〒${my.postal_code ?? ""} ${my.address ?? ""}`;
  document.getElementById("my_tel").textContent = my.tel ?? "";
  document.getElementById("my_fax").textContent = my.fax ?? "";

  // ★ 発注書ヘッダ
  const { data: doc } = await supabase
    .from("document")
    .select("*")
    .eq("id", docId)
    .single();

  document.getElementById("title").textContent = doc.title;
  document.getElementById("document_date").textContent = doc.document_date;
  document.getElementById("doc_id").textContent = doc.id;

  // 発注先（取引先 ID）
  document.getElementById("torihikisaki_name").textContent = doc.torihikisaki_id;

  // 納付先（送付先）
  document.getElementById("name").textContent = doc.name ?? "";
  document.getElementById("department").textContent = doc.department ?? "";
  document.getElementById("person").textContent = doc.person ?? "";
  document.getElementById("invoice_number").textContent = doc.invoice_number ?? "";

  // 備考
  document.getElementById("memo").textContent = doc.memo ?? "";

  // 明細
  const { data: details } = await supabase
    .from("document_detail")
    .select("*")
    .eq("document_id", docId)
    .order("id");

  const tbody = document.getElementById("detail_body");
  details.forEach(d => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${d.item}</td>
      <td class="right">${d.quantity}</td>
      <td class="right">${Number(d.price).toLocaleString()}</td>
      <td class="right">${Number(d.amount).toLocaleString()}</td>
      <td>${d.unit}</td>
      <td>${d.tax_rate}%</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("total").textContent =
    Number(doc.total).toLocaleString();
}
</script>
</head>

<body>

<!-- ★ ロゴ（後で差し替え可能） -->
<!-- <img src="logo.png" style="width:150px; position:absolute; top:40px; left:40px;"> -->

<!-- ★ 印影（後で差し替え可能） -->
<!-- <img src="inkan.png" style="width:120px; position:absolute; top:40px; right:40px; opacity:0.85;"> -->

<h1 id="title">発注書</h1>

<div class="header-box">
  <div class="company-info">
    <div id="my_name" style="font-size:20px; font-weight:bold;"></div>
    <div id="my_address"></div>
    <div>
      TEL: <span id="my_tel"></span>
      / FAX: <span id="my_fax"></span>
    </div>
  </div>

  <div>
    <div>発行日：<span id="document_date"></span></div>
    <div>発注番号：<span id="doc_id"></span></div>
  </div>
</div>

<div class="section-title">発注先（取引先）</div>
<div id="torihikisaki_name"></div>

<div class="section-title">納付先（送付先）</div>
<div id="name"></div>
<div id="department"></div>
<div id="person"></div>
<div id="invoice_number"></div>

<div class="section-title">明細</div>
<table>
  <thead>
    <tr>
      <th>品目</th>
      <th>数量</th>
      <th>単価</th>
      <th>金額</th>
      <th>単位</th>
      <th>税率</th>
    </tr>
  </thead>
  <tbody id="detail_body"></tbody>
</table>

<div class="total-box">
  合計：<span id="total"></span> 円
</div>

<div class="section-title">備考</div>
<div class="memo-box" id="memo"></div>

<br><br>
<button onclick="window.print()">PDF 印刷</button>

</body>
</html>
