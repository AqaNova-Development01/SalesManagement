<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>発注書 PDF</title>

<style>
  body {
    font-family: "Yu Gothic", sans-serif;
    padding: 20px 40px;
    width: 800px;
    margin: auto;
  }

  h1 {
    text-align: right;
    font-size: 32px;
    margin: 0;
  }

  /* --- 枠線付きボックス --- */
  .box {
    border: 1px solid #000;
    padding: 10px;
    margin-top: 10px;
  }

  .flex-between {
    display: flex;
    justify-content: space-between;
  }

  .label {
    font-weight: bold;
    margin-bottom: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    border: 1px solid #000;
    padding: 6px;
    font-size: 14px;
  }

  th {
    background: #f0f0f0;
  }

  .right {
    text-align: right;
  }

  .total-table td {
    font-size: 16px;
    font-weight: bold;
  }
  .nav-buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
  }
  
  @media print {
    .nav-buttons {
      display: none;
    }
  }
</style>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
  "https://omzcbfjtwyygvvgxsiov.supabase.co",
  "sb_publishable_Plndzp1kowyp6OgTwTGwHA_iUIO0ae0"
);

const params = new URLSearchParams(window.location.search);
const docId = params.get("id");

// ----------------------------
// ログインチェック
// ----------------------------
async function checkLogin() {
  const { data } = await supabase.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
    return false;
  }
  return true;
}

window.addEventListener("DOMContentLoaded", async () => {
  if (!(await checkLogin())) return;
  await loadPDFData();
});

// ----------------------------
// PDF データ読み込み
// ----------------------------
async function loadPDFData() {

  /* --- 自社情報（TK00000） --- */
  const { data: my } = await supabase
    .from("torihikisaki")
    .select("*")
    .eq("id", "TK00000")
    .single();

  document.getElementById("my_name").textContent = my.name;
  document.getElementById("my_address").textContent =
    `〒${my.postal_code ?? ""} ${my.address ?? ""}`;
  document.getElementById("my_tel").textContent = my.tel ?? "";
  document.getElementById("my_fax").textContent = my.fax ?? "";

  /* --- 発注書ヘッダ --- */
  const { data: doc } = await supabase
    .from("document")
    .select("*")
    .eq("id", docId)
    .single();

  document.getElementById("document_date").textContent = doc.document_date;
  document.getElementById("doc_id").textContent = doc.id;

  /* --- 発注先（取引先） --- */
  const { data: tori } = await supabase
    .from("torihikisaki")
    .select("*")
    .eq("id", doc.torihikisaki_id)
    .single();

  document.getElementById("tori_name").textContent = tori.name ?? "";
  document.getElementById("tori_address").textContent =
    `〒${tori.postal_code ?? ""} ${tori.address ?? ""}`;
  document.getElementById("tori_department").textContent = tori.department ?? "";
  document.getElementById("tori_person").textContent = tori.person ?? "";
  document.getElementById("tori_tel").textContent = tori.tel ?? "";
  document.getElementById("tori_fax").textContent = tori.fax ?? "";

  /* --- 納付先（送付先） --- */
  document.getElementById("delivery_name").textContent = doc.name ?? "";
  document.getElementById("delivery_department").textContent = doc.department ?? "";
  document.getElementById("delivery_person").textContent = doc.person ?? "";
  document.getElementById("delivery_address").textContent = doc.invoice_number ?? "";

  /* --- 明細 --- */
  const { data: details } = await supabase
    .from("document_detail")
    .select("*")
    .eq("document_id", docId)
    .order("id");

  const tbody = document.getElementById("detail_body");
  details.forEach((d, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${d.item}</td>
      <td class="right">${d.quantity}</td>
      <td>${d.unit}</td>
      <td class="right">${Number(d.price).toLocaleString()}</td>
      <td class="right">${Number(d.amount).toLocaleString()}</td>
      <td>${d.memo ?? ""}</td>
    `;
    tbody.appendChild(tr);
  });

  /* --- 合計 --- */
  document.getElementById("total").textContent = Number(doc.total).toLocaleString();
  document.getElementById("tax").textContent = Number(doc.total * 0.1).toLocaleString();
  document.getElementById("grand_total").textContent =
    Number(doc.total * 1.1).toLocaleString();
}
</script>
</head>

<body>

<!-- ★ ロゴ（後で差し替え可能） -->
<!-- <img src="logo.png" style="width:120px; position:absolute; top:20px; left:20px;"> -->

<h1>発注書</h1>

<!-- 自社情報 -->
<div class="box">
  <div id="my_name" style="font-size:18px; font-weight:bold;"></div>
  <div id="my_address"></div>
  <div>TEL: <span id="my_tel"></span> / FAX: <span id="my_fax"></span></div>
</div>

<!-- 発注日・番号 -->
<div class="flex-between" style="margin-top:10px;">
  <div></div>
  <div>
    発行日：<span id="document_date"></span><br>
    発注番号：<span id="doc_id"></span>
  </div>
</div>

<!-- 発注先 -->
<div class="box">
  <div class="label">発注先</div>
  <div id="tori_name"></div>
  <div id="tori_address"></div>
  <div id="tori_department"></div>
  <div id="tori_person"></div>
  <div>TEL: <span id="tori_tel"></span> / FAX: <span id="tori_fax"></span></div>
</div>

<!-- 納付先 -->
<div class="box">
  <div class="label">納付先（送付先）</div>
  <div id="delivery_name"></div>
  <div id="delivery_department"></div>
  <div id="delivery_person"></div>
  <div id="delivery_address"></div>
</div>

<!-- 明細 -->
<table>
  <thead>
    <tr>
      <th>No.</th>
      <th>品名</th>
      <th>数量</th>
      <th>単位</th>
      <th>単価</th>
      <th>金額</th>
      <th>備考</th>
    </tr>
  </thead>
  <tbody id="detail_body"></tbody>
</table>

<!-- 合計 -->
<table class="total-table" style="margin-top:20px;">
  <tr>
    <td style="width:150px;">合計</td>
    <td class="right"><span id="total"></span> 円</td>
  </tr>
  <tr>
    <td>消費税（10%）</td>
    <td class="right"><span id="tax"></span> 円</td>
  </tr>
  <tr>
    <td>合計金額</td>
    <td class="right"><span id="grand_total"></span> 円</td>
  </tr>
</table>

<br>
<button onclick="window.print()">PDF 印刷</button>
<div class="nav-buttons">
  <button onclick="location.href='index.html'">メニューへ戻る</button>
  <button onclick="history.back()">一覧へ戻る</button>
</div>

</body>
</html>
